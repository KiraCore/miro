<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta content="A new Flutter project." name="description">

  <!-- iOS meta tags & icons -->
  <meta content="yes" name="apple-mobile-web-app-capable">
  <meta content="black" name="apple-mobile-web-app-status-bar-style">
  <meta content="miro" name="apple-mobile-web-app-title">
  <link href="icons/Icon-192.png" rel="apple-touch-icon">

  <title>miro</title>
  <link href="manifest.json" rel="manifest">
  <link href="styles/styles.css" rel="stylesheet"/>

  <script src='script/jsQR.min.js' type="text/javascript"></script>
</head>
<body style="overflow: hidden">
<!-- Loading Indicator -->
<div class="container" id="loading_container">
  <img alt="loading..." class="indicator" src="./icons/loading-logo.gif">
</div>
<!-- This script installs service_worker.js to provide PWA functionality to
     application. For more information, see:
     https://developers.google.com/web/fundamentals/primers/service-workers -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('flutter-first-frame', function () {
            navigator.serviceWorker.register('flutter_service_worker.js');
        });
    }
</script>
<script src="main.dart.js" type="application/javascript"></script>
<!-- Removes the loading indicator after 10 seconds -->
<script>
    window.onload = function () {
        setTimeout(function () {
            const loadingIndicator = document.getElementById("loading_container");
            if (loadingIndicator) {
                loadingIndicator.remove();
            }
        }, 10000)
    }
</script>
</body>
</html>
